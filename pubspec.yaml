name: weather_app
description: A simple minimal weather app.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  geolocator: ^10.0.0
  lottie: ^3.1.0
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.5.4
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F2027"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#0F2027"
  image: assets/icon/app_icon.png
  android_12:
    color: "#0F2027"
    image: assets/icon/app_icon.png
  fullscreen: true